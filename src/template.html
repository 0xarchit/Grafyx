<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kgraph - Obsidian View</title>
<script src="https://unpkg.com/force-graph"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
body {
    margin: 0;
    overflow: hidden;
    background-color: #0b0c10;
    font-family: 'Inter', sans-serif;
    color: #c5c6c7;
}
#graph {
    width: 100vw;
    height: 100vh;
}

/* Glassmorphism Panel Base */
.ui-panel {
    position: absolute;
    background: rgba(11, 12, 16, 0.7);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(102, 252, 241, 0.15);
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 16px 40px rgba(0, 0, 0, 0.5);
    z-index: 10;
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    max-height: calc(100vh - 80px);
    overflow-y: auto;
}

.ui-panel::-webkit-scrollbar {
    width: 6px;
}
.ui-panel::-webkit-scrollbar-thumb {
    background: rgba(102, 252, 241, 0.3);
    border-radius: 6px;
}

/* Left Controls */
.left-panel {
    top: 24px;
    left: 24px;
    width: 280px;
}

/* Right Navigation & Info */
.right-panel {
    top: 24px;
    right: 24px;
    width: 320px;
}

.ui-panel h1 {
    margin: 0 0 8px 0;
    font-size: 1.5rem;
    font-weight: 700;
    color: #66fcf1;
    letter-spacing: -0.03em;
}

.ui-panel h2 {
    margin: 0 0 16px 0;
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #45a29e;
    border-bottom: 1px solid rgba(102, 252, 241, 0.1);
    padding-bottom: 6px;
}

.search-box {
    margin-bottom: 20px;
}
.search-box input {
    width: 100%;
    padding: 10px 12px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 8px;
    color: #fff;
    font-size: 0.9rem;
    outline: none;
    transition: border 0.2s;
    box-sizing: border-box;
}
.search-box input:focus {
    border-color: #66fcf1;
}

.stat-box {
    display: flex;
    justify-content: space-between;
    padding: 8px 12px;
    background: rgba(255, 255, 255, 0.03);
    border-radius: 8px;
    margin-bottom: 8px;
    border: 1px solid rgba(255, 255, 255, 0.05);
}
.stat-box span:first-child {
    font-size: 0.8rem;
    color: #8c8f94;
}
.stat-box span:last-child {
    font-weight: 600;
    color: #fff;
}

.control-group {
    margin-top: 20px;
}
.control-item {
    margin-bottom: 16px;
}
.control-item label {
    display: flex;
    justify-content: space-between;
    font-size: 0.75rem;
    margin-bottom: 6px;
    color: #a0a3a8;
}
.control-item input[type="range"] {
    width: 100%;
    cursor: pointer;
    accent-color: #66fcf1;
}
.checkbox-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.8rem;
    color: #c5c6c7;
    cursor: pointer;
    margin-bottom: 10px;
}
.checkbox-item input {
    accent-color: #66fcf1;
}

#node-details {
    padding: 16px;
    background: rgba(31, 40, 51, 0.6);
    border-radius: 8px;
    border: 1px solid rgba(102, 252, 241, 0.2);
    margin-top: 16px;
    display: none;
}
#node-details h3 {
    margin: 0 0 10px 0;
    font-size: 1rem;
    color: #fff;
    word-break: break-all;
}
#node-details p {
    margin: 4px 0;
    font-size: 0.8rem;
    color: #c5c6c7;
}
.tag {
    display: inline-block;
    padding: 2px 8px;
    background: rgba(102, 252, 241, 0.15);
    color: #66fcf1;
    border-radius: 12px;
    font-size: 0.7rem;
    text-transform: uppercase;
    font-weight: 600;
}
.action-btn {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    background: rgba(102, 252, 241, 0.1);
    color: #66fcf1;
    border: 1px solid rgba(102, 252, 241, 0.3);
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 600;
    transition: all 0.2s;
}
.action-btn:hover {
    background: rgba(102, 252, 241, 0.2);
}
</style>
</head>
<body>

<div class="ui-panel left-panel">
    <h1>kgraph</h1>
    
    <div class="stat-box">
        <span>Nodes</span>
        <span id="stat-nodes">0</span>
    </div>
    <div class="stat-box">
        <span>Edges</span>
        <span id="stat-edges">0</span>
    </div>

    <button id="btn-replay" class="action-btn">Replay Extraction</button>

    <div class="control-group">
        <h2>Appearance Filters</h2>
        <label class="checkbox-item"><input type="checkbox" id="chk-arrows"> Directional Arrows</label>
        <label class="checkbox-item"><input type="checkbox" id="chk-funcs" checked> Show Functions</label>
        <label class="checkbox-item"><input type="checkbox" id="chk-imports" checked> Show Imports</label>
        <label class="checkbox-item"><input type="checkbox" id="chk-calls" checked> Show Calls</label>
    </div>

    <div class="control-group">
        <h2>Physics Engine</h2>
        <div class="control-item">
            <label><span>Repel Charge</span> <span id="val-charge">-140</span></label>
            <input type="range" id="ctrl-charge" min="-800" max="-10" value="-140">
        </div>
        <div class="control-item">
            <label><span>Link Distance</span> <span id="val-distance">40</span></label>
            <input type="range" id="ctrl-distance" min="10" max="300" value="40">
        </div>
        <div class="control-item">
            <label><span>Center Gravity</span> <span id="val-gravity">0.05</span></label>
            <input type="range" id="ctrl-gravity" min="0" max="1" step="0.01" value="0.05">
        </div>
        <div class="control-item">
            <label><span>Damping (Friction)</span> <span id="val-friction">0.8</span></label>
            <input type="range" id="ctrl-friction" min="0" max="1" step="0.01" value="0.8">
        </div>
        <div class="control-item">
            <label><span>Simulation Speed</span> <span id="val-speed">0.05</span></label>
            <input type="range" id="ctrl-speed" min="0.001" max="0.1" step="0.001" value="0.05">
        </div>
    </div>
</div>

<div class="ui-panel right-panel">
    <h2>Search Engine</h2>
    <div class="search-box">
        <input type="text" id="search-input" list="node-datalist" placeholder="Search files, functions, modules...">
        <datalist id="node-datalist"></datalist>
    </div>

    <div id="node-details">
        <div style="display: flex; gap: 8px; margin-bottom: 8px;">
            <span class="tag" id="det-kind">File</span>
            <span class="tag" id="det-lang" style="color:#dea584; background:rgba(222, 165, 132, 0.15)">Rust</span>
            <span class="tag" id="det-service" style="color:#f1e05a; background:rgba(241, 224, 90, 0.15)">Service</span>
        </div>
        <h3 id="det-name">src/main.rs</h3>
        <p><strong>Path:</strong> <span id="det-path"></span></p>
        <p><strong>Connections:</strong> <span id="det-conns"></span> edges</p>
    </div>
</div>

<div id="graph"></div>

<script>
const rawData = {{GRAPH_DATA_PLACEHOLDER}};

let state = {
    charge: -140,
    distance: 40,
    gravity: 0.05,
        friction: 0.8,
    speed: 0.05,
    
    
    showFuncs: true,
    showImports: true,
    showCalls: true,
    arrows: false,
    
    scale: 1.0,
    lodThreshold: 0.8,
    
    hoverNode: null,
    focusedNode: null,
    isReplaying: false
};

const serviceMap = {};
rawData.nodes.forEach(n => {
    let p = n.file_path.replace(/\\/g, '/');
    let parts = p.split('/');
    let service = parts.length > 1 ? parts[1] : 'root';
    n.service = service;
    serviceMap[service] = (serviceMap[service] || 0) + 1;
});

const datalist = document.getElementById('node-datalist');
rawData.nodes.forEach(n => {
    let option = document.createElement('option');
    option.value = n.name;
    datalist.appendChild(option);
});

// Controls
['charge', 'distance', 'gravity', 'friction', 'speed'].forEach(id => {
    document.getElementById('ctrl-' + id).addEventListener('input', e => {
        let v = parseFloat(e.target.value);
        state[id] = v;
        document.getElementById('val-' + id).innerText = v;
        state.isReplaying = false;
        updatePhysics();
    });
});

const chkMap = { 'chk-funcs': 'showFuncs', 'chk-imports': 'showImports', 'chk-calls': 'showCalls', 'chk-arrows': 'arrows' };
Object.keys(chkMap).forEach(id => {
    document.getElementById(id).addEventListener('change', e => {
        state[chkMap[id]] = e.target.checked;
        state.isReplaying = false;
        refreshData();
    });
});

const linkRelations = new Map();
rawData.edges.forEach(edge => {
    let a = typeof edge.from_node_id === 'object' ? edge.from_node_id.id : edge.from_node_id;
    let b = typeof edge.to_node_id === 'object' ? edge.to_node_id.id : edge.to_node_id;
    if (!linkRelations.has(a)) linkRelations.set(a, new Set());
    if (!linkRelations.has(b)) linkRelations.set(b, new Set());
    linkRelations.get(a).add(b);
    linkRelations.get(b).add(a);
});

function getNeighbors(nodeId) {
    return linkRelations.get(nodeId) || new Set();
}

function computeData() {
    const renderFuncs = state.showFuncs && state.scale > state.lodThreshold;
    
    let nodes = rawData.nodes.filter(n => {
        if (!renderFuncs && n.kind !== 'File' && n.kind !== 'Module') return false;
        return true;
    });
    
    let nset = new Set(nodes.map(n => n.id));
    
    let edges = rawData.edges.filter(e => {
        let a = typeof e.from_node_id === 'object' ? e.from_node_id.id : e.from_node_id;
        let b = typeof e.to_node_id === 'object' ? e.to_node_id.id : e.to_node_id;
        
        if (!nset.has(a) || !nset.has(b)) return false;
        if (!state.showImports && e.relation_type === 'Imports') return false;
        if (!state.showCalls && e.relation_type === 'Calls') return false;
        
        return true;
    }).map(e => {
        let w = 1.0;
        if (e.relation_type === 'CallsService') w = 3.0;
        else if (e.relation_type === 'Imports') w = 2.0;
        else if (e.relation_type === 'Calls') w = 1.0;
        else w = 0.5;
        return {...e, weight: w};
    });

    return { nodes, edges };
}

const colors = {
    'rust': '#dea584', 'javascript': '#f1e05a', 'typescript': '#3178c6',
    'python': '#3572A5', 'go': '#00ADD8', 'java': '#b07219'
};

const dt = computeData();
document.getElementById('stat-nodes').innerText = dt.nodes.length;
document.getElementById('stat-edges').innerText = dt.edges.length;

let gData = { nodes: [], links: [] };

const Graph = ForceGraph()(document.getElementById('graph'))
    .graphData(gData)
    .nodeRelSize(5)
    .nodeId('id')
    .nodeColor(n => colors[n.language] || '#66fcf1')
    .linkColor(e => {
        if (e.relation_type === 'CallsService') return 'rgba(255, 107, 107, 0.8)'; // Bold Red
        if (e.relation_type === 'Imports') return 'rgba(74, 222, 128, 0.6)'; // Green
        return 'rgba(102, 252, 241, 0.4)'; // Teal/Dashed
    })
    .linkWidth(e => {
        let base = 1.0;
        if (e.relation_type === 'CallsService') base = 4.0;
        else if (e.relation_type === 'Imports') base = 2.0;
        
        if (!state.focusedNode && !state.hoverNode) return base;
        
        let active = state.focusedNode || state.hoverNode;
        let a = e.source.id || e.source; let b = e.target.id || e.target;
        if (active.id === a || active.id === b) return base + 2;
        return Math.max(0.2, base * 0.5);
    })
    .linkLineDash(e => e.relation_type === 'Calls' ? [3, 2] : null)
    .linkDirectionalArrowLength(e => state.arrows ? 3.5 : 0)
    .linkDirectionalArrowRelPos(1)
    .nodeCanvasObject((node, ctx, globalScale) => {
        let alpha = 1.0;
        if (state.focusedNode) {
            let active = state.focusedNode;
            let neighbors = getNeighbors(active.id);
            if (node.id !== active.id && !neighbors.has(node.id)) {
                alpha = 0.15;
            }
        }

        ctx.globalAlpha = alpha;
        
        const label = node.name;
        const fontSize = (node.val === 8 ? 14 : 10) / globalScale;
        ctx.font = `500 ${fontSize}px Inter, sans-serif`;
        
        ctx.fillStyle = colors[node.language] || '#66fcf1';
        ctx.beginPath();
        ctx.arc(node.x, node.y, node.val, 0, 2 * Math.PI, false);
        ctx.fill();
        
        if (state.hoverNode && state.hoverNode.id === node.id) {
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1;
            ctx.stroke();
        }

        if (globalScale > Math.max(0.4, state.lodThreshold / 2)) {
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.9})`;
            ctx.fillText(label, node.x, node.y + node.val + fontSize + 2);
        }
        ctx.globalAlpha = 1.0; 
    })
    .onNodeHover(node => {
        document.getElementById('graph').style.cursor = node ? 'pointer' : null;
        state.hoverNode = node;
    })
    .onNodeClick(node => {
        if (state.focusedNode && state.focusedNode.id === node.id) {
            state.focusedNode = null; 
            document.getElementById('node-details').style.display = 'none';
        } else {
            state.focusedNode = node;
            Graph.centerAt(node.x, node.y, 1000);
            Graph.zoom(4, 2000);
            
            const det = document.getElementById('node-details');
            document.getElementById('det-kind').innerText = node.kind;
            document.getElementById('det-lang').innerText = node.language;
            document.getElementById('det-service').innerText = node.service;
            document.getElementById('det-name').innerText = node.name;
            document.getElementById('det-path').innerText = node.file_path;
            document.getElementById('det-conns').innerText = getNeighbors(node.id).size;
            det.style.display = 'block';
        }
    })
    .onBackgroundClick(() => {
        state.focusedNode = null;
        document.getElementById('node-details').style.display = 'none';
    })
    .onZoom(e => {
        state.scale = e.k;
        if (!state.isReplaying) refreshData();
    });

// Install initial custom forces missing on default
Graph.d3Force('x', d3.forceX().strength(state.gravity));
Graph.d3Force('y', d3.forceY().strength(state.gravity));

updatePhysics();

function refreshData() {
    if (state.isReplaying) return;
    const updated = computeData();
    document.getElementById('stat-nodes').innerText = updated.nodes.length;
    document.getElementById('stat-edges').innerText = updated.edges.length;
    
    let existMap = new Map();
    Graph.graphData().nodes.forEach(n => existMap.set(n.id, n));

    let g = {
        nodes: updated.nodes.map(n => {
            let exist = existMap.get(n.id);
            let payload = {...n, val: n.kind === 'File' ? 8 : 4};
            if (exist) {
                payload.x = exist.x; payload.y = exist.y; payload.vx = exist.vx; payload.vy = exist.vy;
            }
            return payload;
        }),
        links: updated.edges.map(e => {
            let a = typeof e.from_node_id === 'object' ? e.from_node_id.id : e.from_node_id;
            let b = typeof e.to_node_id === 'object' ? e.to_node_id.id : e.to_node_id;
            return { source: a, target: b, relation_type: e.relation_type, weight: e.weight };
        })
    };
    Graph.graphData(g);
}

function updatePhysics() {
    let charge = Graph.d3Force('charge');
    if (charge) charge.strength(state.charge);
    
    let link = Graph.d3Force('link');
    if (link) link.distance(linkNode => state.distance / (linkNode.weight || 1));
    
    let fx = Graph.d3Force('x');
    if (fx) fx.strength(state.gravity);
    
    let fy = Graph.d3Force('y');
    if (fy) fy.strength(state.gravity);
         
    Graph.d3VelocityDecay(state.friction);
    Graph.d3AlphaDecay(state.speed);
    Graph.d3ReheatSimulation();
}

function playReplay() {
    if (state.isReplaying) return;
    state.isReplaying = true;
    
    let src = computeData();
    let nIdx = 0;
    
    let currentNodes = [];
    let currentLinks = [];
    let activeSet = new Set();

    let rootNodes = src.nodes.filter(n => n.kind === 'File');
    let subNodes = src.nodes.filter(n => n.kind !== 'File');
    let orderedNodes = [...rootNodes, ...subNodes];

    let g = { nodes: [], links: [] };
    Graph.graphData(g);

    let interval = setInterval(() => {
        if (!state.isReplaying) {
            clearInterval(interval);
            refreshData();
            return;
        }

        let nAdded = 0;
        while (nAdded < 5 && nIdx < orderedNodes.length) {
            let n = orderedNodes[nIdx++];
            currentNodes.push({...n, val: n.kind === 'File' ? 8 : 4});
            activeSet.add(n.id);
            nAdded++;
        }
        
        currentLinks = src.edges.filter(e => {
            let a = typeof e.from_node_id === 'object' ? e.from_node_id.id : e.from_node_id;
            let b = typeof e.to_node_id === 'object' ? e.to_node_id.id : e.to_node_id;
            return activeSet.has(a) && activeSet.has(b);
        }).map(e => {
            let a = typeof e.from_node_id === 'object' ? e.from_node_id.id : e.from_node_id;
            let b = typeof e.to_node_id === 'object' ? e.to_node_id.id : e.to_node_id;
            return { source: a, target: b, relation_type: e.relation_type, weight: e.weight };
        });

        Graph.graphData({ nodes: [...currentNodes], links: [...currentLinks] });
        
        document.getElementById('stat-nodes').innerText = currentNodes.length;
        document.getElementById('stat-edges').innerText = currentLinks.length;

        if (nIdx >= orderedNodes.length) {
            clearInterval(interval);
            state.isReplaying = false;
        }
    }, 60);
}

document.getElementById('btn-replay').addEventListener('click', () => {
    playReplay();
});

document.getElementById('search-input').addEventListener('change', e => {
    let q = e.target.value.toLowerCase();
    let target = rawData.nodes.find(n => n.name.toLowerCase() === q);
    if (!target) return;
    
    if ((target.kind !== 'File' && target.kind !== 'Module') && !state.showFuncs) {
        state.showFuncs = true;
        document.getElementById('chk-funcs').checked = true;
        refreshData();
    }
    
    state.focusedNode = target;
    setTimeout(() => {
        let activeGraphNode = Graph.graphData().nodes.find(n => n.id === target.id);
        if (activeGraphNode) {
            Graph.centerAt(activeGraphNode.x, activeGraphNode.y, 1000);
            Graph.zoom(6, 2000);
            
            const det = document.getElementById('node-details');
            document.getElementById('det-kind').innerText = activeGraphNode.kind;
            document.getElementById('det-lang').innerText = activeGraphNode.language;
            document.getElementById('det-service').innerText = activeGraphNode.service;
            document.getElementById('det-name').innerText = activeGraphNode.name;
            document.getElementById('det-path').innerText = activeGraphNode.file_path;
            document.getElementById('det-conns').innerText = getNeighbors(activeGraphNode.id).size;
            det.style.display = 'block';
        }
    }, state.showFuncs ? 0 : 500);
});

// Auto-start
setTimeout(() => playReplay(), 200);

</script>
</body>
</html>
