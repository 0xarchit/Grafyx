<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kgraph - Obsidian View</title>
<script src="https://unpkg.com/force-graph"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
body {
    margin: 0;
    overflow: hidden;
    background-color: #0b0c10;
    font-family: 'Inter', sans-serif;
    color: #c5c6c7;
}
#graph {
    width: 100vw;
    height: 100vh;
}
.ui-overlay {
    position: absolute;
    top: 24px;
    left: 24px;
    background: rgba(31, 40, 51, 0.4);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(102, 252, 241, 0.15);
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4);
    z-index: 10;
    max-width: 320px;
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.ui-overlay:hover {
    transform: translateY(-4px);
    border: 1px solid rgba(102, 252, 241, 0.3);
}
.ui-overlay h1 {
    margin: 0 0 12px 0;
    font-size: 1.75rem;
    font-weight: 700;
    color: #66fcf1;
    letter-spacing: -0.03em;
    text-shadow: 0 2px 10px rgba(102, 252, 241, 0.3);
}
.ui-overlay p {
    margin: 0 0 20px 0;
    font-size: 0.9rem;
    opacity: 0.85;
    line-height: 1.6;
}
.stat-box {
    display: flex;
    justify-content: space-between;
    padding: 14px;
    background: rgba(11, 12, 16, 0.6);
    border-radius: 10px;
    margin-bottom: 10px;
    border: 1px solid rgba(255, 255, 255, 0.05);
    transition: background 0.3s ease;
}
.stat-box:hover {
    background: rgba(69, 162, 158, 0.1);
}
.stat-box span:first-child {
    font-weight: 500;
    color: #45a29e;
}
.stat-box span:last-child {
    font-weight: 700;
    color: #fff;
    text-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
}
</style>
</head>
<body>
<div class="ui-overlay">
    <h1>kgraph</h1>
    <p>Interactive knowledge graph mapping project structural dependencies.</p>
    <div class="stat-box">
        <span>Nodes</span>
        <span id="node-count">0</span>
    </div>
    <div class="stat-box">
        <span>Edges</span>
        <span id="edge-count">0</span>
    </div>
</div>
<div id="graph"></div>
<script>
fetch('./graph.json')
    .then(res => res.json())
    .then(data => {
        document.getElementById('node-count').innerText = data.nodes.length;
        document.getElementById('edge-count').innerText = data.edges.length;
        
        const gData = {
            nodes: data.nodes.map(n => ({ id: n.id, name: n.name, val: n.kind === 'File' ? 8 : 4, group: n.language })),
            links: data.edges.map(e => ({ source: e.from_node_id, target: e.to_node_id }))
        };

        const colorMap = {
            'rust': '#dea584',
            'javascript': '#f1e05a',
            'typescript': '#3178c6',
            'python': '#3572A5',
            'go': '#00ADD8',
            'java': '#b07219'
        };

        const Graph = ForceGraph()(document.getElementById('graph'))
            .graphData(gData)
            .nodeColor(n => colorMap[n.group] || '#66fcf1')
            .nodeRelSize(5)
            .nodeResolution(18)
            .linkWidth(1.2)
            .linkColor(() => 'rgba(69, 162, 158, 0.35)')
            .linkDirectionalParticles(2)
            .linkDirectionalParticleWidth(2)
            .linkDirectionalParticleSpeed(0.005)
            .d3Force('charge', d3.forceManyBody().strength(-120))
            .nodeCanvasObject((node, ctx, globalScale) => {
                const label = node.name;
                const fontSize = 14 / globalScale;
                ctx.font = `500 ${fontSize}px Inter, sans-serif`;
                
                ctx.fillStyle = node.color;
                ctx.beginPath();
                ctx.arc(node.x, node.y, node.val, 0, 2 * Math.PI, false);
                ctx.fill();

                if (globalScale > 1.5) {
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                    const textY = node.y + node.val + fontSize + 2;
                    ctx.fillText(label, node.x, textY);
                }
            })
            .onNodeHover(node => {
                document.getElementById('graph').style.cursor = node ? 'pointer' : null;
            })
            .onNodeClick(node => {
                Graph.centerAt(node.x, node.y, 1000);
                Graph.zoom(4, 2000);
            });
    });
</script>
</body>
</html>
